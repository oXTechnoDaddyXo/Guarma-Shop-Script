<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Guarma Merchant Company
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

<div id="shop">

    <div class="left">

        <div class="header">

            <h1>
                <span id="shopTitle"></span>
            </h1>

            <p>
                <span id="shopSubtitle"></span>
            </p>

            <div class="welcomeBox">

                <h2>
                    <span id="welcomeTitle"></span>
                </h2>

                <span id="welcomeText"></span>

            </div>

        </div>

        <div id="categories"></div>

        <div id="items"></div>

    </div>

    <div class="cart">

        <h2>
            <span id="cartTitle"></span>
        </h2>

        <div id="cartItems"></div>

        <div class="total">

            <span id="totalPrice">
                $0
            </span>

        </div>

        <button id="checkoutBtn">
            <span id="checkoutText"></span>
        </button>

        <button id="closeBtn">
            <span id="closeText"></span>
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
